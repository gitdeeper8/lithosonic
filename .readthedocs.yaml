# LITHO-SONIC ReadTheDocs Configuration

version: 2

# ============================================
# BUILD CONFIGURATION
# ============================================
build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  jobs:
    pre_build:
      - pip install -r docs/requirements.txt
      - python scripts/generate_api_docs.py

# ============================================
# SPHINX CONFIGURATION
# ============================================
sphinx:
  configuration: docs/source/conf.py
  builder: html
  fail_on_warning: true

# ============================================
# PYTHON CONFIGURATION
# ============================================
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
    - requirements: docs/requirements.txt

# ============================================
# SEARCH
# ============================================
search:
  ranking:
    api/*: 3
    tutorials/*: 2
    explanations/*: 1

# ============================================
# FORMATS
# ============================================
formats:
  - pdf
  - epub
  - htmlzip

# ============================================
# VERSIONING
# ============================================
versioning:
  formats: all
  defaults:
    fallback_to_latest: true

# ============================================
# REDIRECTS
# ============================================
redirects:
  index: README.md
  installation: INSTALL.md
  contributing: CONTRIBUTING.md
  changelog: CHANGELOG.md
