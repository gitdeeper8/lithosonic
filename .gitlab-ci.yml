# LITHO-SONIC GitLab CI/CD Configuration

stages:
  - test
  - build
  - deploy
  - docs

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

cache:
  paths:
    - .cache/pip
    - venv/

# ============================================
# TEST STAGE
# ============================================
.test_template: &test_definition
  stage: test
  image: python:3.10-slim
  before_script:
    - pip install --upgrade pip
    - pip install pytest pytest-cov
    - pip install -r requirements.txt
    - pip install -e .
  script:
    - pytest tests/ -v --cov=lithosonic --cov-report=term

test-python39:
  <<: *test_definition
  image: python:3.9-slim

test-python310:
  <<: *test_definition
  image: python:3.10-slim

test-python311:
  <<: *test_definition
  image: python:3.11-slim

lint:
  stage: test
  image: python:3.10-slim
  before_script:
    - pip install flake8 black
  script:
    - flake8 lithosonic/ tests/
    - black --check lithosonic/ tests/

# ============================================
# BUILD STAGE
# ============================================
build-package:
  stage: build
  image: python:3.10-slim
  before_script:
    - pip install build twine
  script:
    - python -m build
    - twine check dist/*
  artifacts:
    paths:
      - dist/

build-docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
  only:
    - main
    - tags

# ============================================
# DEPLOY STAGE
# ============================================
deploy-pypi:
  stage: deploy
  image: python:3.10-slim
  before_script:
    - pip install twine
  script:
    - TWINE_PASSWORD=${PYPI_TOKEN} twine upload --username __token__ dist/*
  only:
    - tags
  when: manual

# ============================================
# DOCS STAGE
# ============================================
build-docs:
  stage: docs
  image: python:3.10-slim
  before_script:
    - pip install mkdocs mkdocs-material
  script:
    - mkdocs build --strict
  artifacts:
    paths:
      - site/

pages:
  stage: deploy
  script:
    - mv site/ public/
  artifacts:
    paths:
      - public
  only:
    - main
